<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>造悟社 CMS 后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#080810;color:#fff;min-height:100vh;display:flex}
.l{width:200px;background:#0d0d1a;border-right:1px solid rgba(255,255,255,.08);padding:20px 0;flex-shrink:0}
.l h1{font-size:14px;padding:0 16px 16px;margin-bottom:12px;color:#e8242a;letter-spacing:2px}
.n{padding:11px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.5);border-left:3px solid transparent;transition:all .2s}
.n:hover{color:#fff;background:rgba(255,255,255,.04)}
.n.act{color:#fff;border-left-color:#e8242a;background:rgba(232,36,42,.08)}
.m{flex:1;padding:28px 36px;overflow-y:auto;max-height:100vh}
.pg{display:none}
.pg.act{display:block}
.tt{font-size:18px;font-weight:700;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px;margin-bottom:12px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;color:rgba(255,255,255,.4);margin-bottom:5px;letter-spacing:1px}
.fg input,.fg textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff;padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.fg input:focus,.fg textarea:focus{border-color:#e8242a}
.fg textarea{min-height:70px;resize:vertical}
.b{padding:8px 16px;background:linear-gradient(135deg,#e8242a,#b01a1f);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.b:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(232,36,42,.3)}
.b-d{background:rgba(232,36,42,.12);border:1px solid rgba(232,36,42,.25);color:#e8242a;padding:6px 12px;font-size:11px}
.tip{color:rgba(255,255,255,.4);font-size:12px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.toast{position:fixed;bottom:20px;right:20px;background:#111;border:1px solid rgba(255,255,255,.1);padding:12px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:9999}
.toast.ok{border-color:#22c55e;color:#22c55e}
.toast.show{opacity:1}
</style>
</head>

function sp(id, el) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('act'));
  document.querySelectorAll('.n').forEach(n => n.classList.remove('act'));
  document.getElementById('pg-' + id).classList.add('act');
  if (el) el.classList.add('act');
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderProducts() {
  let h = '';
  (d.products || []).forEach(function(p, i) {
    h += '<div class="card"><div class="fg"><label>产品名称</label><input value="' + esc(p.name) + '" onchange="d.products[' + i + '].name=this.value"></div>';
    h += '<div class="fg"><label>标签</label><input value="' + esc(p.tag) + '" onchange="d.products[' + i + '].tag=this.value"></div>';
    h += '<div class="fg"><label>系列</label><input value="' + esc(p.series) + '" onchange="d.products[' + i + '].series=this.value"></div>';
    h += '<div class="fg"><label>描述</label><textarea onchange="d.products[' + i + '].desc=this.value">' + esc(p.desc) + '</textarea></div>';
    h += '<div class="fg"><label>价格</label><input value="' + esc(p.price) + '" onchange="d.products[' + i + '].price=this.value"></div>';
    h += '<div class="fg"><label>价格备注</label><input value="' + esc(p.priceNote) + '" onchange="d.products[' + i + '].priceNote=this.value"></div>';
    h += '<div class="fg"><label>图片路径</label><input value="' + esc(p.img) + '" onchange="d.products[' + i + '].img=this.value"></div>';
    h += '<button class="b b-d" onclick="delProducts(' + i + ')">删除</button></div>';
  });
  document.getElementById('list-products').innerHTML = h;
}

function addProducts() {

function delProducts(i) {
  if (!confirm('确定删除?')) return;
  d.products.splice(i, 1);
  renderProducts();
  toast('已删除', 'ok');
}

function saveHero() {
  d.brand = document.getElementById('f-brand').value;
  d.navBadge = document.getElementById('f-navBadge').value;
  d.heroEyebrow = document.getElementById('f-heroEyebrow').value;
  d.heroLine1 = document.getElementById('f-heroLine1').value;
  d.heroLine2 = document.getElementById('f-heroLine2').value;
  d.heroDesc = document.getElementById('f-heroDesc').value;
  d.heroBtn1 = document.getElementById('f-heroBtn1').value;
  d.heroBtn2 = document.getElementById('f-heroBtn2').value;
  doSave();
}

  d.contact.title = document.getElementById('c-title').value;
  d.contact.subtitle = document.getElementById('c-subtitle').value;
  d.contact.phone = document.getElementById('c-phone').value;
  d.contact.email = document.getElementById('c-email').value;
  d.contact.hours = document.getElementById('c-hours').value;
  d.contact.address = document.getElementById('c-address').value;

}

function saveFooter() {
  d.footerBrand = document.getElementById('f-brand2').value;
  d.footerInfo = document.getElementById('f-info').value;
  doSave();
}

function doSave() {
  localStorage.setItem('cms', JSON.stringify(d));
  var b = new Blob([JSON.stringify(d, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'site.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('已保存并下载', 'ok');
}

function toast(msg, t) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + t + ' show';
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}

renderNav();
