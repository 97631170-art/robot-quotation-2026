<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 - 造悟社</title>
<style>
*,:after,:before{box-sizing:border-box;margin:0;padding:0}
:root{--r:#e8242a;--r2:#b01a1f;--bg:#080810;--bg2:#0d0d1a;--s:rgba(255,255,255,.04);--b:rgba(255,255,255,.08);--m:rgba(255,255,255,.5)}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex}

/* 左侧边栏 */
.lay{width:240px;background:var(--bg2);border-right:1px solid var(--b);padding:24px 0;flex-shrink:0}
.lay h1{font-size:13px;font-weight:700;padding:0 20px 20px;margin-bottom:16px;letter-spacing:2px;border-bottom:1px solid var(--b)}
.nitem{padding:13px 20px;cursor:pointer;font-size:13px;color:var(--m);border-left:3px solid transparent;transition:all .2s}
.nitem:hover{color:#fff;background:rgba(255,255,255,.04)}
.nitem.act{color:#fff;border-left-color:var(--r);background:rgba(232,36,42,.08)}

/* 主区 */
.main{flex:1;padding:32px 40px;overflow-y:auto;max-height:100vh}

/* 页面 */
.pg{display:none}
.pg.act{display:block}
.tt{font-size:20px;font-weight:700;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--b)}

/* 表单 */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;color:var(--m);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.fg input,.fg textarea{width:100%;background:var(--s);border:1px solid var(--b);color:#fff;padding:10px 14px;border-radius:6px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.fg input:focus,.fg textarea:focus{border-color:var(--r)}
.fg textarea{min-height:80px;resize:vertical}

/* 按钮 */
.btn{padding:9px 20px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-r{background:linear-gradient(135deg,var(--r),var(--r2));color:#fff}
.btn-r:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(232,36,42,.35)}
.btn-o{background:transparent;border:1px solid var(--b);color:var(--m)}
.btn-o:hover{border-color:var(--r);color:var(--r)}
.btn-del{background:rgba(232,36,42,.12);border:1px solid rgba(232,36,42,.25);color:var(--r);padding:5px 12px;border-radius:4px;font-size:11px;cursor:pointer}

/* 产品卡片 */
.panels{display:flex;flex-direction:column;gap:12px}
.pp{background:var(--s);border:1px solid var(--b);border-radius:10px;overflow:hidden}
.pp.act{border-color:rgba(232,36,42,.4)}
.phd{padding:12px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.s-name{font-size:13px;font-weight:600}
.pbd{padding:16px;display:none}
.pp.act .pbd{display:block}
.frow{display:flex;gap:12px;align-items:center;margin-bottom:12px;padding:10px;background:var(--s);border-radius:6px}
.frow input{flex:1}

/* 导航 */
.nav-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;padding:10px;background:var(--s);border-radius:6px}
.nav-row input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--b);color:#fff;padding:8px 12px;border-radius:5px;font-size:12px}
.chk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--m);white-space:nowrap}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#111;border:1px solid var(--b);padding:12px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:9999}
.toast.ok{border-color:#22c55e;color:#22c55e}
.toast.err{border-color:var(--r);color:var(--r)}
.toast.show{opacity:1}
</style>
</head>
<body>

// 页面切换
function sp(id, el) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('act'));
  document.querySelectorAll('.nitem').forEach(n => n.classList.remove('act'));
  document.getElementById('pg-' + id).classList.add('act');
  if (el) el.classList.add('act');
}

// 产品
function updProd(i, k, v) { d.products[i][k] = v; }
function delProd(i) { if (confirm('删除?')) { d.products.splice(i, 1); renderProds(); toast('已删除', 'ok'); }}
function addProd() {
  d.products.push({tag:'新品',series:'SERIES-N',name:'新机器人',desc:'',specs:[],price:'¥1,000',priceNote:'整机含遥控器',hot:false,img:'/images/placeholder.jpg'});
  renderProds(); toast('已添加', 'ok');
}
function togglePanel(el) { el.classList.toggle('active'); }
function renderProds() {
  document.getElementById('prod-list').innerHTML = d.products.map((p, i) => `
    <div class="pp${i===0?' active':''}" onclick="togglePanel(this)">
      <div class="phd"><span class="s-name">${esc(p.name)}</span><button class="btn-del" onclick="event.stopPropagation();delProd(${i})">删除</button></div>
      <div class="pbd">
        <div class="fg"><label>名称</label><input value="${esc(p.name)}" onchange="updProd(${i},'name',this.value)"></div>
        <div class="fg"><label>标签</label><input value="${esc(p.tag)}" onchange="updProd(${i},'tag',this.value)"></div>
        <div class="fg"><label>系列</label><input value="${esc(p.series)}" onchange="updProd(${i},'series',this.value)"></div>
        <div class="fg"><label>描述</label><textarea onchange="updProd(${i},'desc',this.value)">${esc(p.desc)}</textarea></div>
        <div class="fg"><label>价格</label><input value="${esc(p.price)}" onchange="updProd(${i},'price',this.value)"></div>
        <div class="fg"><label>图片路径</label><input value="${esc(p.img)}" onchange="updProd(${i},'img',this.value)"></div>
        <div class="fg"><label>规格(每行一个)</label><textarea onchange="updProd(${i},'specs',this.value.split('\n'))">${esc((p.specs||[]).join('\n'))}</textarea></div>
      </div>
    </div>`).join('');
}

// 导航
function updNav(i, k, v) { d.nav[i][k] = v; }
function addNav() { d.nav.push({text:'新链接',href:'#',cta:false}); renderNav(); }
function renderNav() {
  document.getElementById('nav-list').innerHTML = d.nav.map((n, i) => `
    <div class="nav-row">
      <input placeholder="文字" value="${esc(n.text)}" onchange="updNav(${i},'text',this.value)">
      <input placeholder="链接" value="${esc(n.href)}" onchange="updNav(${i},'href',this.value)">
      <label class="chk"><input type="checkbox" ${n.cta?'checked':''} onchange="updNav(${i},'cta',this.checked)">CTA</label>
    </div>`).join('');
}

// 保存
function saveHero() {
  ['brand','navBadge','heroEyebrow','heroLine1','heroLine2','heroDesc','heroBtn1','heroBtn2'].forEach(k => d[k] = document.getElementById('f-' + k).value);
  doSave();
}
function saveContact() {
  d.contact.phone = document.getElementById('f-phone').value;
  d.contact.email = document.getElementById('f-email').value;
  d.contact.hours = document.getElementById('f-hours').value;
  d.contact.address = document.getElementById('f-address').value;
  doSave();
}
function saveNav() { doSave(); }
function doSave() {
  localStorage.setItem('cms', JSON.stringify(d));
  const b = new Blob([JSON.stringify(d, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(b);
  a.download = 'cms_data/site.json'; a.click();
  toast('已保存并下载', 'ok');
}

// Toast
function toast(msg, t) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast ' + t + ' show';
  setTimeout(() => el.classList.remove('show'), 2000);
}

// HTML转义
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
