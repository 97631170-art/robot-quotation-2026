<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PingFang SC', sans-serif; background: #0a0a14; color: #fff; }
.admin-layout { display: flex; min-height: 100vh; }

.nav-item:hover, .nav-item.active { background: rgba(232,36,42,0.1); border-left-color: #e8242a; }
.page { display: none; padding: 30px; }
.page.active { display: block; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-size: 12px; color: #888; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; background: #1a1a24; border: 1px solid #333; color: #fff; border-radius: 6px; }
.form-group textarea { min-height: 80px; resize: vertical; }
.prod-card { background: #1a1a24; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.btn { padding: 10px 20px; background: linear-gradient(135deg, #e8242a, #b01a1f); color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px; }
.btn:hover { opacity: 0.9; }
.btn-save { background: #22c55e; }
#prod-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
</style>
</head>

<div class="admin-layout">

      <button class="btn btn-save" onclick="saveProducts()">💾 保存</button>
    </div>
    <div id="page-contact" class="page">
      <h2>联系信息</h2>
      <div class="form-group"><label>电话</label><input id="contact-phone"></div>
      <div class="form-group"><label>邮箱</label><input id="contact-email"></div>
      <button class="btn btn-save" onclick="saveContact()">💾 保存</button>
    </div>
    <div id="page-publish" class="page">
      <h2>发布网站</h2>
      <p>点击下方按钮将网站发布到 GitHub Pages</p>
      <button class="btn" onclick="publishSite()">🚀 发布网站</button>

function renderProducts(prods) {
  const container = document.getElementById('prod-list');
  container.innerHTML = prods.map((p, i) => '<div class="prod-card">' +
    '<input class="prod-name" value="' + p.name + '" placeholder="产品名称">' +
    '<input class="prod-tag" value="' + p.tag + '" placeholder="标签">' +
    '<textarea class="prod-desc" placeholder="描述">' + p.desc + '</textarea>' +
    '<input class="prod-price" value="' + p.price + '" placeholder="价格">' +
    '<input class="prod-img" value="' + p.img + '" placeholder="图片路径">' +
    '<button class="btn" onclick="delProduct(' + i + ')">🗑️ 删除</button>' +
    '</div>').join('');
}

function addProduct() {
  siteData.products.push({
    name: '新机器人',
    tag: '新品',
    series: 'SERIES-X',
    desc: '请编辑产品描述...',
    specs: ['重量: 320g'],
    price: '¥1,000',
    priceNote: '整机含遥控器',
    hot: false,
    img: '/images/placeholder.jpg'
  });
  renderProducts(siteData.products);
}

function delProduct(i) {
  if (confirm('确定删除这个产品？')) {
    siteData.products.splice(i, 1);
    renderProducts(siteData.products);
  }
}

function saveProducts() {
  const cards = document.querySelectorAll('.prod-card');
  cards.forEach((card, i) => {
    siteData.products[i].name = card.querySelector('.prod-name').value;
    siteData.products[i].tag = card.querySelector('.prod-tag').value;
    siteData.products[i].desc = card.querySelector('.prod-desc').value;
    siteData.products[i].price = card.querySelector('.prod-price').value;
    siteData.products[i].img = card.querySelector('.prod-img').value;
  });
  localStorage.setItem('siteData', JSON.stringify(siteData));
  alert('产品已保存到 localStorage！');
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (el) el.classList.add('active');
}

function saveContact() {
  siteData.contact.phone = document.getElementById('contact-phone').value;
  siteData.contact.email = document.getElementById('contact-email').value;
  localStorage.setItem('siteData', JSON.stringify(siteData));
  alert('联系信息已保存！');
}

function publishSite() {
  alert('请运行 node upload_github.js 发布网站');
}

// 初始化
document.getElementById('contact-phone').value = siteData.contact?.phone || '';
document.getElementById('contact-email').value = siteData.contact?.email || '';
renderProducts(siteData.products || []);
</script>
