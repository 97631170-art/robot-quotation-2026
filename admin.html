<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>造悟社 CMS 后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#333}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.5rem;font-weight:600}
.header .user{font-size:.9rem;opacity:.8}
.main{display:flex;min-height:calc(100vh - 70px)}
.sidebar{width:220px;background:#fff;padding:20px 0;border-right:1px solid #e5e7eb}
.sidebar a{display:block;padding:12px 24px;color:#4b5563;text-decoration:none;transition:.2s;border-left:3px solid transparent}
.sidebar a:hover,.sidebar a.active{background:#eef2ff;color:#4f46e5;border-left-color:#4f46e5}
.content{flex:1;padding:30px;overflow-y:auto}
.section{display:none}
.section.active{display:block}
.section h2{font-size:1.3rem;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #e5e7eb}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card img{max-width:100%;border-radius:8px;margin-bottom:12px}
.card-body{display:flex;flex-direction:column;gap:10px}
.card input,.card textarea,.card select{width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:.95rem}
.card textarea{min-height:80px;resize:vertical}
.card input:focus,.card textarea:focus,.card select:focus{outline:none;border-color:#4f46e5}
.inp-title{font-size:1.1rem!important;font-weight:600!important;border-color:#4f46e5!important}
.inp-tag{background:#fef3c7!important;border-color:#f59e0b!important}
.inp-icon{width:60px!important;text-align:center;font-size:1.5rem!important}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.grid .card{height:100%}
.btn{background:#4f46e5;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:1rem;transition:.2s}
.btn:hover{background:#4338ca}
.btn-del{background:#ef4444!important}
.btn-del:hover{background:#dc2626!important}
.btn-sm{padding:6px 12px;font-size:.85rem;background:#6b7280}
.btn-change-img{background:#10b981!important;padding:8px 16px;font-size:.85rem;margin-top:8px}
.img-wrap{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.img-wrap img{max-width:300px;border-radius:8px;display:block;margin:12px 0}
.img-wrap .btn{margin-top:10px}
.no-img{background:#f3f4f6;color:#9ca3af;padding:40px;text-align:center;border-radius:8px}
.no-img-sm{padding:15px}
.feat-img-wrap,.class-img-wrap,.acc-img-wrap{position:relative;display:inline-block}
.feat-img,.class-img,.acc-img{max-width:80px!important;margin:0!important}
.prod-img{max-width:200px;margin:0 auto 12px!important;display:block!important}
.prod-img-wrap{text-align:center;background:#f9fafb;padding:12px;border-radius:8px;margin-bottom:12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:8px;margin-bottom:8px}
.nav-item input{flex:1}
.nav-item label{display:flex;align-items:center;gap:6px;white-space:nowrap}
.nav-item input[type="checkbox"]{width:auto}
.footer{background:#1a1a2e;color:#fff;padding:16px 30px;display:flex;justify-content:space-between;align-items:center;margin-top:40px}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-weight:500;color:#374151}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px}
.form-group textarea{min-height:100px}
.timeline{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px}
.timeline-item{background:#fff;padding:16px;border-radius:8px;min-width:150px;text-align:center}
.timeline-item input{text-align:center;border:none;border-bottom:2px solid #4f46e5;border-radius:0;padding:4px}
.alert{padding:16px;background:#fef3c7;border-left:4px solid #f59e0b;border-radius:4px;margin-bottom:20px}
#uploadModal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000}
#uploadModal.active{display:flex}
.modal-content{background:#fff;padding:30px;border-radius:16px;max-width:500px;width:90%}
.modal-content h3{margin-bottom:20px}
.modal-content .btn{margin-top:16px;width:100%}
.drop-zone{border:2px dashed #e5e7eb;border-radius:12px;padding:40px;text-align:center;transition:.2s;cursor:pointer}
.drop-zone:hover,.drop-zone.dragover{border-color:#4f46e5;background:#eef2ff}
</style>
</head>

// 切换分区
function showSection(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

  document.getElementById('sec-' + name).classList.add('active');

// 更新数据
function updRoot(path, val) {
  const keys = path.split('.');
  let obj = data;
  for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]];
  obj[keys[keys.length - 1]] = val;
}

function updItem(arr, idx, field, val) {
  const keys = arr.split('.');
  let obj = data;
  for (let k of keys) obj = obj[k];
  obj[idx][field] = val;
}

function updProd(idx, field, val) {
  data.products[idx][field] = val;
}

function delItem(arr, idx) {
  const keys = arr.split('.');
  let obj = data;
  for (let k of keys.slice(0,-1)) obj = obj[k];
  obj.splice(idx, 1);
  renderAll();
}

// 图片上传
function uploadImg(type, idx) {
  uploadTarget = {type, idx};
  document.getElementById('uploadModal').classList.add('active');
  document.getElementById('uploadStatus').innerHTML = '';
}

function closeUploadModal() {
  document.getElementById('uploadModal').classList.remove('active');
  uploadTarget = null;
}

// 拖拽上传
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });

document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    document.getElementById('uploadStatus').innerHTML = '<span style="color:red">请选择图片文件</span>';
    return;
  }
  document.getElementById('uploadStatus').innerHTML = '<span>上传中...</span>';
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const imgData = e.target.result;
    const fileName = 'img_' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.]/g, '');
    const imgPath = '/images/' + fileName;
    
    // 保存图片到本地
    const link = document.createElement('a');
    link.download = fileName;
    link.href = imgData;
    link.click();
    
    // 更新数据
    setTimeout(() => {
      const newPath = prompt('图片已下载，请重命名为: ' + fileName + '\n然后移动到 images 文件夹后，点击确定', imgPath);
      if (newPath !== null) {
        applyImgPath(newPath);
      }
      closeUploadModal();
    }, 500);
  };
  reader.readAsDataURL(file);
}

function applyImgPath(path) {
  const {type, idx} = uploadTarget;
  switch(type) {
    case 'product': data.products[idx].img = path; renderProducts(); break;
    case 'feature': data.features[idx].iconImg = path; renderFeatures(); break;
    case 'class': data.competition.classes[idx].img = path; renderClasses(); break;
    case 'accessory': data.accessories.items[idx].img = path; renderAccessories(); break;
    case 'hero': data.heroImg = path; document.getElementById('heroImgPreview').src = path; break;
    case 'feat': data.featImg = path; document.getElementById('featImgPreview').src = path; break;
    case 'qr': data.contact.qrImg = path; break;
  }
  alert('图片路径已更新: ' + path + '\n\n请确保图片文件已上传到 images 文件夹！');
}

// 保存
function saveData() {
  // 更新 heroImg 和 featImg
  const heroVal = document.querySelector('#heroImgPreview, .img-wrap img')?.src || data.heroImg;
  const featVal = document.getElementById('featImgPreview')?.src || data.featImg;
  
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'site.json';
  a.click();
  URL.revokeObjectURL(url);
  
  // 复制到剪贴板
  navigator.clipboard.writeText(json).then(() => {
    alert('✅ site.json 已下载！\n\n请将内容复制到 cms_data/site.json 并运行 node upload_github.js');
  }).catch(() => {
    alert('✅ site.json 已下载！\n\n请复制内容到 cms_data/site.json 并运行 node upload_github.js');
  });
}
