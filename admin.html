<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>造悟社 CMS 管理后台</title>
<style>
:root{--primary:#6366f1;--primary-dark:#4f46e5;--success:#10b981;--danger:#ef4444;--bg:#0f0f23;--bg2:#1a1a2e;--bg3:#252542;--text:#fff;--text-muted:#9ca3af;--border:#2d2d4a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* 顶部导航 */
.header{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(15,15,35,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:1000}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),#a855f7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.logo-text{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,#fff,var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-actions{display:flex;gap:12px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#059669}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg3)}
.btn-sm{padding:6px 12px;font-size:0.8rem}
/* 布局 */
.container{display:flex;padding-top:60px;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:60px;left:0;bottom:0;overflow-y:auto}
.sidebar-nav{padding:16px 0}
.nav-item{padding:14px 24px;display:flex;align-items:center;gap:12px;color:var(--text-muted);cursor:pointer;transition:.2s;border-left:3px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,0.1);color:var(--primary);border-left-color:var(--primary)}
.nav-item .icon{font-size:1.2rem}
.nav-item .count{margin-left:auto;background:var(--bg3);padding:2px 8px;border-radius:10px;font-size:0.75rem}
/* 主内容 */
.main{flex:1;margin-left:240px;padding:24px}
.page-title{font-size:1.5rem;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.page-title .icon{font-size:1.8rem}
/* 卡片 */
.card{background:var(--bg2);border-radius:16px;border:1px solid var(--border);margin-bottom:24px}
.card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:1.1rem;font-weight:600}
.card-body{padding:24px}
/* 产品卡片 */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.product-item{background:var(--bg3);border-radius:12px;overflow:hidden;transition:.2s}
.product-item:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(99,102,241,0.2)}
.product-img{width:100%;height:180px;object-fit:cover;background:var(--bg)}
.product-info{padding:16px}
.product-name{font-weight:600;margin-bottom:8px;font-size:1rem}
.product-tag{display:inline-block;background:var(--primary);padding:4px 10px;border-radius:20px;font-size:0.7rem;margin-bottom:8px}
.product-desc{color:var(--text-muted);font-size:0.85rem;line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-actions{display:flex;gap:8px}
/* 编辑器 */
.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-weight:600;margin-bottom:8px;color:var(--text)}
.form-input,.form-textarea,.form-select{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.95rem;transition:.2s}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--primary)}
.form-textarea{min-height:100px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* 图片上传 */
.img-upload-area{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.img-upload-area:hover{border-color:var(--primary);background:rgba(99,102,241,0.05)}
.img-upload-area .icon{font-size:3rem;margin-bottom:12px;color:var(--text-muted)}
.img-upload-area .text{color:var(--text-muted)}
.img-upload-area img{max-width:100%;max-height:200px;border-radius:8px}
.img-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
/* 列表 */
.list-item{display:flex;align-items:center;padding:16px;background:var(--bg3);border-radius:10px;margin-bottom:12px;transition:.2s}
.list-item:hover{background:var(--bg)}
.list-item .icon-wrap{width:48px;height:48px;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-right:16px}
.list-item .info{flex:1}
.list-item .name{font-weight:600;margin-bottom:4px}
.list-item .desc{color:var(--text-muted);font-size:0.85rem}
.list-item .actions{display:flex;gap:8px}
/* 模态框 */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--bg2);border-radius:16px;width:95%;max-width:700px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1.2rem}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:10px;font-weight:500;opacity:0;transform:translateY(20px);transition:.3s;z-index:3000}
.toast.show{opacity:1;transform:translateY(0)}
.toast-success{background:var(--success);color:#fff}
.toast-error{background:var(--danger);color:#fff}
.toast-info{background:var(--primary);color:#fff}
/* 特性列表 */
.feature-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.feature-item{background:var(--bg3);border-radius:12px;padding:24px;text-align:center;position:relative}
.feature-item .icon{font-size:3rem;margin-bottom:16px}
.feature-item .title{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.feature-item .desc{color:var(--text-muted);font-size:0.9rem}
.feature-item .actions{position:absolute;top:12px;right:12px}
/* 隐藏 */
.hidden{display:none !important}
/* 响应式 */
@media(max-width:768px){
.sidebar{display:none}
.main{margin-left:0}
.editor-grid{grid-template-columns:1fr}
}
/* 加载动画 */
.loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.loading-spinner{width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}
}
/* 发布状态 */
.publish-status{padding:12px 24px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;gap:12px;margin-bottom:24px}
.publish-status .dot{width:10px;height:10px;border-radius:50%;background:var(--success)}
.publish-status.ready .dot{background:var(--success)}
</style>
</head>
<body>
<!-- 顶部导航 -->

  <div class="logo">

    <!-- 产品管理 -->

// 页面切换
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById('page-' + page).classList.remove('hidden');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.target.closest('.nav-item').classList.add('active');
}

// Toast提示
function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ============ 保存弹窗 ============
function saveModal() {
  const {type, idx} = currentEdit;
  
  switch(type) {
    case 'product':
      const pData = {
        name: document.getElementById('editName').value,
        tag: document.getElementById('editTag').value,
        series: document.getElementById('editSeries').value,
        desc: document.getElementById('editDesc').value,
        price: document.getElementById('editPrice').value,
        img: document.getElementById('editImg').value,
        specs: []
      };
      if (idx === 'new') {
        siteData.products.push(pData);
      } else {
        siteData.products[idx] = pData;
      }
      renderProducts();
      break;
    case 'feature':
      const fData = {
        icon: document.getElementById('editIcon').value,
        title: document.getElementById('editTitle').value,
        desc: document.getElementById('editDesc').value
      };
      if (idx === 'new') {
        siteData.features.push(fData);
      } else {
        siteData.features[idx] = fData;
      }
      renderFeatures();
      break;
    case 'class':
      const cData = {
        icon: document.getElementById('editIcon').value,
        name: document.getElementById('editName').value,
        weight: document.getElementById('editWeight').value,
        group: document.getElementById('editGroup').value,
        desc: document.getElementById('editDesc').value
      };
      if (idx === 'new') {
        siteData.competition.classes.push(cData);
      } else {
        siteData.competition.classes[idx] = cData;
      }
      renderClasses();
      break;
    case 'accessory':
      const aData = {
        icon: document.getElementById('editIcon').value,
        name: document.getElementById('editName').value,
        desc: document.getElementById('editDesc').value,
        price: document.getElementById('editPrice').value
      };
      if (idx === 'new') {
        siteData.accessories.items.push(aData);
      } else {
        siteData.accessories.items[idx] = aData;
      }
      renderAccessories();
      break;
  }
  
  closeModal();
  toast('✅ 保存成功，记得发布！', 'success');
}

  document.getElementById('editModal').classList.remove('active');
  currentEdit = {type:'', idx:null};

// ============ 图片上传 ============
async function uploadImg(fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  
  // 获取token
  let token = localStorage.getItem('gh_token');
  if (!token) {
    token = prompt('请输入 GitHub Token（用于上传图片）:\n\n获取方式: GitHub Settings → Developer settings → Personal access tokens → Generate new token');
    if (!token) return;
    localStorage.setItem('gh_token', token);
  }
  
  toast('⏳ 上传中...', 'info');
  
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const fileName = 'img_' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
    const path = 'images/' + fileName;
    
    try {
      const apiUrl = 'https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/contents/' + path;
      
      // 检查是否已存在
      let sha = null;
      const getRes = await fetch(apiUrl, {headers: {'Authorization': 'Bearer ' + token}});
      if (getRes.ok) sha = (await getRes.json()).sha;
      
      // 上传
      const payload = {message: 'Upload: ' + fileName, content: base64};
      if (sha) payload.sha = sha;
      
      const resp = await fetch(apiUrl, {
        method: 'PUT',
        headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      
      if (resp.ok) {
        const imgPath = '/' + path;
        document.getElementById('editImg').value = imgPath;
        document.getElementById('imgPreview').src = imgPath;
        toast('✅ 图片上传成功！', 'success');
      } else {
        throw new Error(await resp.text());
      }
    } catch(e) {
      toast('❌ 上传失败: ' + e.message, 'error');
    }
  };
  reader.readAsDataURL(file);
}

// ============ 发布网站 ============
async function publishAll() {
  toast('⏳ 正在发布...', 'info');
  
  try {
    const resp = await fetch('http://localhost:7788/api/publish', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(siteData)
    });
    
    if (resp.ok) {
      toast('🎉 发布成功！网站约 1-5 分钟后生效', 'success');
    } else {
      throw new Error();
    }
  } catch(e) {
    // 下载JSON
    const json = JSON.stringify(siteData, null, 2);
    const blob = new Blob([json], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'site.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('⚠️ 请运行 node server 后再发布', 'error');
  }
}
