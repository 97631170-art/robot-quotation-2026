<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>后台管理 - 造悟社格斗机器人</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#e8242a;--red-dark:#b01a1f;--bg:#0a0a14;--surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);--muted:rgba(255,255,255,.5)}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
.layout{display:flex;min-height:100vh}

/* 左侧导航 */
.sidebar{width:220px;background:#0d0d1a;border-right:1px solid var(--border);padding:24px 0;flex-shrink:0}
.sidebar h1{font-size:14px;font-weight:700;padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:20px;letter-spacing:2px}
.nav-item{padding:14px 20px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.05)}
.nav-item.active{color:#fff;border-left-color:var(--red);background:rgba(232,36,42,.1)}

/* 主内容区 */
.main{flex:1;padding:32px 40px;overflow-y:auto}
.page{display:none}
.page.active{display:block}
.page-title{font-size:20px;font-weight:700;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}

/* 表单 */
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px;letter-spacing:1px}
.form-group input,.form-group textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:#fff;padding:12px 16px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--red)}
.form-group textarea{min-height:100px;resize:vertical}

/* 按钮 */
.btn{padding:10px 24px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff}
.btn-red:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,36,42,.4)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--red);color:var(--red)}

/* 产品卡片 */
.prod-list{display:flex;flex-direction:column;gap:16px}
.prod-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.prod-panel.active{border-color:var(--red)}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);cursor:pointer}
.prod-series{font-size:12px;color:var(--red);letter-spacing:2px;font-weight:600}
.panel-body{padding:20px;display:none}
.prod-panel.active .panel-body{display:block}
.btn-del{background:rgba(232,36,42,.15);border:1px solid rgba(232,36,42,.3);color:var(--red);padding:6px 14px;border-radius:4px;font-size:12px;cursor:pointer}

/* 保存提示 */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;border:1px solid var(--border);padding:12px 24px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;z-index:1000}
.toast.show{opacity:1}
.toast.success{border-color:#22c55e;color:#22c55e}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>

// 页面切换
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (el) el.classList.add('active');
}

// 产品操作
function updProd(idx, field, val) {
  siteData.products[idx][field] = val;
  if (field === 'series') {
    document.querySelectorAll('.prod-series')[idx].textContent = val;
  }
}

function delProd(idx) {
  if (confirm('确定删除这个产品？')) {
    siteData.products.splice(idx, 1);
    renderProds();
    toast('已删除', 'success');
  }
}

function addProd() {
  siteData.products.push({
    tag:'新品',series:'SERIES-N',name:'新机器人',
    desc:'请编辑产品描述...',specs:['重量: 320g','材质: ABS+'],
    price:'¥1,000',priceNote:'整机含遥控器',hot:false,img:'/images/placeholder.jpg'
  });
  renderProds();
  toast('已添加', 'success');
}

function renderProds() {
  const list = document.getElementById('prod-list');
  list.innerHTML = siteData.products.map((p, i) => `
    <div class="prod-panel${i === 0 ? ' active' : ''}" data-index="${i}" onclick="toggleProd(this)">
      <div class="panel-header">
        <span class="prod-series">${p.series}</span>
        <button class="btn-del" onclick="event.stopPropagation();delProd(${i})">删除</button>
      </div>
      <div class="panel-body">
        <div class="form-group"><label>产品名称</label><input type="text" value="${esc(p.name)}" onchange="updProd(${i},'name',this.value)"></div>
        <div class="form-group"><label>标签</label><input type="text" value="${esc(p.tag)}" onchange="updProd(${i},'tag',this.value)"></div>
        <div class="form-group"><label>描述</label><textarea onchange="updProd(${i},'desc',this.value)">${esc(p.desc)}</textarea></div>
        <div class="form-group"><label>价格</label><input type="text" value="${esc(p.price)}" onchange="updProd(${i},'price',this.value)"></div>
        <div class="form-group"><label>图片路径</label><input type="text" value="${esc(p.img)}" onchange="updProd(${i},'img',this.value)"></div>
        <div class="form-group"><label>规格（每行一个）</label><textarea onchange="updProd(${i},'specs',this.value.split('\n'))">${esc((p.specs||[]).join('\n'))}</textarea></div>
      </div>
    </div>
  `).join('');
}

function toggleProd(el) {
  el.classList.toggle('active');
}

// 导航操作
function updNav(idx, field, val) {
  siteData.nav[idx][field] = val;
}

function addNav() {
  siteData.nav.push({text:'新链接',href:'#',cta:false});
  renderNav();
}

function renderNav() {
  document.getElementById('nav-list').innerHTML = siteData.nav.map((n, i) => `
    <div class="nav-row" style="display:flex;gap:12px;align-items:center;margin-bottom:12px;padding:12px;background:var(--surface);border-radius:8px">
      <input type="text" placeholder="文字" value="${esc(n.text)}" onchange="updNav(${i},'text',this.value)" style="flex:1">
      <input type="text" placeholder="链接" value="${esc(n.href)}" onchange="updNav(${i},'href',this.value)" style="flex:1">
      <label style="display:flex;align-items:center;gap:6px;white-space:nowrap"><input type="checkbox" ${n.cta?'checked':''} onchange="updNav(${i},'cta',this.checked)"> CTA</label>
    </div>
  `).join('');
}

// 字段保存
function saveField(type) {
  if (type === 'hero') {
    siteData.brand = document.getElementById('f-brand').value;
    siteData.heroEyebrow = document.getElementById('f-heroEyebrow').value;
    siteData.heroLine1 = document.getElementById('f-heroLine1').value;
    siteData.heroLine2 = document.getElementById('f-heroLine2').value;
    siteData.heroDesc = document.getElementById('f-heroDesc').value;
  } else if (type === 'contact') {
    siteData.contact.phone = document.getElementById('f-phone').value;
    siteData.contact.email = document.getElementById('f-email').value;
    siteData.contact.hours = document.getElementById('f-hours').value;
    siteData.contact.address = document.getElementById('f-address').value;
  }
  // 保存到 localStorage
  localStorage.setItem('siteData', JSON.stringify(siteData));
  // 下载 JSON 文件
  downloadJson();
  toast('已保存并下载 JSON', 'success');
}

function downloadJson() {
  const blob = new Blob([JSON.stringify(siteData, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'site.json';
  a.click();
  URL.revokeObjectURL(url);
}

// 发布
function publishSite() {
  downloadJson();
  toast('请下载 site.json，然后运行 node gen_static.js', 'success');
}

// Toast 提示
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2000);
}

// HTML 转义
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
