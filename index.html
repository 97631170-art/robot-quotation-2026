<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>格斗机器人报价单</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      color: #333;
      font-size: 14px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 头部 ===== */
    .header {
      background: linear-gradient(135deg, #1a237e, #283593);
      color: #fff;
      padding: 18px 16px 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(26,35,126,0.35);
    }
    .header h1 { font-size: 17px; font-weight: 700; margin-bottom: 2px; letter-spacing: 1px; }
    .header p { font-size: 11px; opacity: 0.75; letter-spacing: 0.5px; }

    /* ===== 分组标签 ===== */
    .tabs {
      display: flex;
      background: #fff;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 1px solid #e0e0e0;
      position: sticky;
      top: 76px;
      z-index: 99;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 10px 14px;
      font-size: 13px;
      color: #666;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: #1a237e;
      font-weight: 600;
      border-bottom-color: #1a237e;
    }

    /* ===== 主内容 ===== */
    .main {
      padding: 10px 10px 90px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ===== 客户信息 ===== */
    .customer-info {
      background: #fff;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .customer-info h3 { font-size: 13px; color: #1a237e; margin-bottom: 8px; font-weight: 600; }
    .customer-info .row { display: flex; align-items: center; margin-bottom: 6px; }
    .customer-info label { font-size: 12px; color: #888; width: 56px; flex-shrink: 0; }
    .customer-info input {
      flex: 1;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      background: #fafafa;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }
    .customer-info input:focus { border-color: #1a237e; background: #fff; }

    /* ===== 产品卡片 ===== */
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 4px 6px;
    }
    .section-title h3 { font-size: 14px; color: #444; font-weight: 600; }
    .add-row-btn {
      background: #e8eaf6;
      color: #1a237e;
      border: none;
      border-radius: 16px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    .add-row-btn:active { background: #c5cae9; }

    /* 产品行 */
    .product-row {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      position: relative;
      transition: box-shadow 0.2s;
    }
    .product-row:active { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }

    .product-row .top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    /* 图片区 */
    .img-box {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      border: 1.5px dashed #ccc;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      background: #f8f9fa;
      position: relative;
      transition: border-color 0.2s;
    }
    .img-box:hover { border-color: #1a237e; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-box .placeholder {
      font-size: 26px;
      color: #ccc;
      line-height: 1;
      text-align: center;
    }
    .img-box .img-del {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: #f44336;
      color: #fff;
      border-radius: 50%;
      border: none;
      font-size: 12px;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      display: none;
      z-index: 2;
    }
    .img-box.has-img .img-del { display: block; }

    /* 产品名称+备注 */
    .product-fields { flex: 1; min-width: 0; }
    .product-fields input.product-name {
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      background: #fafafa;
      color: #1a237e;
      font-weight: 600;
      outline: none;
      margin-bottom: 5px;
      transition: border-color 0.2s;
    }
    .product-fields input.product-name:focus { border-color: #1a237e; background: #fff; }
    .product-fields textarea.product-note {
      width: 100%;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      background: #fafafa;
      color: #666;
      outline: none;
      resize: none;
      height: 30px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .product-fields textarea.product-note:focus { border-color: #1a237e; background: #fff; }

    /* 删除行按钮 */
    .del-row-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .del-row-btn:hover { color: #f44336; }

    /* 价格行 */
    .price-row {
      display: flex;
      gap: 8px;
      padding: 0 2px;
    }
    .price-item { flex: 1; text-align: center; }
    .price-item label { display: block; font-size: 10px; color: #aaa; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .price-item input {
      width: 100%;
      text-align: center;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 6px 4px;
      font-size: 13px;
      color: #333;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }
    .price-item input:focus { border-color: #1a237e; background: #fff; }
    .price-item.price-retail input { color: #e53935; font-weight: 600; }
    .price-item.price-wholesale input { color: #1a237e; font-weight: 600; }

    /* ===== 底部工具栏 ===== */
    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex;
      justify-content: center;
      padding: 10px 16px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      gap: 12px;
      z-index: 200;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
    }
    .toolbar button {
      flex: 1;
      max-width: 180px;
      padding: 11px 0;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-save {
      background: #e8eaf6;
      color: #1a237e;
    }
    .btn-save:active { background: #c5cae9; transform: scale(0.97); }
    .btn-preview {
      background: #1a237e;
      color: #fff;
    }
    .btn-preview:active { background: #283593; transform: scale(0.97); }

    /* ===== 预览弹窗 ===== */
    .preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 500;
      flex-direction: column;
      align-items: center;
    }
    .preview-overlay.show { display: flex; }
    .preview-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(0,0,0,0.6);
      position: relative;
      z-index: 501;
    }
    .preview-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .preview-actions { display: flex; gap: 10px; }
    .preview-action-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      border-radius: 16px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
    }
    .preview-action-btn:active { background: rgba(255,255,255,0.35); }

    .preview-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      padding: 16px 0;
    }
    .preview-page {
      background: #fff;
      width: 100%;
      max-width: 375px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      min-height: 100%;
    }

    /* 预览页内容 */
    .preview-title {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #1a237e;
    }
    .preview-title h1 { font-size: 18px; color: #1a237e; font-weight: 700; margin-bottom: 2px; }
    .preview-title p { font-size: 11px; color: #888; }
    .preview-customer {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #555;
    }
    .preview-customer div { margin-bottom: 3px; }
    .preview-customer strong { color: #333; }
    .preview-section { margin-bottom: 16px; }
    .preview-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #1a237e;
      padding: 4px 0 6px;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 6px;
    }
    .preview-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .preview-table th {
      background: #e8eaf6;
      color: #1a237e;
      padding: 6px 4px;
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      border: 1px solid #c5cae9;
    }
    .preview-table td {
      padding: 5px 4px;
      text-align: center;
      border: 1px solid #e0e0e0;
      vertical-align: middle;
      color: #444;
    }
    .preview-table .td-name { text-align: left; color: #1a237e; font-weight: 600; }
    .preview-table .td-note { text-align: left; color: #888; font-size: 9px; }
    .preview-table .td-retail { color: #e53935; font-weight: 600; }
    .preview-table .td-wholesale { color: #1a237e; font-weight: 600; }
    .preview-table img { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; }
    .preview-footer {
      text-align: center;
      font-size: 10px;
      color: #aaa;
      padding-top: 10px;
      border-top: 1px solid #eee;
      margin-top: 8px;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 600;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* 隐藏 file input */
    .hidden-input { display: none; }

    /* 截图时的滚动区域 */
    .scroll-hint {
      text-align: center;
      padding: 6px;
      font-size: 11px;
      color: #aaa;
      background: #fafafa;
      border-radius: 20px;
      width: 120px;
      margin: 0 auto 8px;
    }
  </style>
</head>
<body>

<!-- 头部 -->
<div class="header">
  <h1>🤖 2026 格斗机器人报价单</h1>
  <p>山东 BoxBot 机器人格斗赛 · 代理价格表</p>
</div>

<!-- 分组标签 -->
<div class="tabs" id="tabs"></div>

<!-- 主内容 -->
<div class="main" id="main"></div>

<!-- 底部工具栏 -->
<div class="toolbar">
  <button class="btn-save" id="btnSave">
    💾 保存
  </button>
  <button class="btn-preview" id="btnPreview">
    🖨️ 打印预览
  </button>
</div>

<!-- 预览弹窗 -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-header">
    <button class="preview-close" id="previewClose">×</button>
    <div class="preview-actions">
      <button class="preview-action-btn" id="btnShare">📤 截图保存</button>
    </div>
  </div>
  <div class="preview-content" id="previewContent">
    <div class="scroll-hint">👆 下滑查看完整报价</div>
    <div class="preview-page" id="previewPage"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 隐藏的文件输入 -->
<input type="file" class="hidden-input" id="hiddenImgInput" accept="image/*">

<script>
// ===== 产品数据配置 =====
const DEFAULT_SECTIONS = [
  {
    id: 'qjlxx',
    name: '轻量级·小学组',
    products: [
      { name: 'BoxBot 轻量级主机', retail: 829, wholesale: 400, note: '含双电机驱动板', img: '' },
      { name: '锂电池 11.1V 1500mAh', retail: 65, wholesale: 49, note: '3S1P 钴酸锂', img: '' },
      { name: '遥控器+接收机', retail: 138, wholesale: 99, note: '4通道', img: '' },
      { name: '充电器', retail: 88, wholesale: 65, note: '平衡充', img: '' },
      { name: '备用车轴', retail: 15, wholesale: 10, note: '2根/套', img: '' },
    ]
  },
  {
    id: 'qjlz',
    name: '轻量级·中学组',
    products: [
      { name: 'BoxBot 轻量级主机', retail: 829, wholesale: 400, note: '含双电机驱动板', img: '' },
      { name: '锂电池 11.1V 1500mAh', retail: 65, wholesale: 49, note: '3S1P 钴酸锂', img: '' },
      { name: '遥控器+接收机', retail: 138, wholesale: 99, note: '4通道', img: '' },
      { name: '充电器', retail: 88, wholesale: 65, note: '平衡充', img: '' },
      { name: '备用车轴', retail: 15, wholesale: 10, note: '2根/套', img: '' },
    ]
  },
  {
    id: 'mzj',
    name: '迷你级',
    products: [
      { name: 'BoxBot 迷你级主机', retail: 429, wholesale: 220, note: '含驱动板', img: '' },
      { name: '锂电池 7.4V 800mAh', retail: 38, wholesale: 28, note: '2S 钴酸锂', img: '' },
      { name: '遥控器+接收机', retail: 138, wholesale: 99, note: '4通道', img: '' },
      { name: '备用车轴', retail: 10, wholesale: 7, note: '2根/套', img: '' },
    ]
  },
  {
    id: 'gdc',
    name: '格斗仓',
    products: [
      { name: '格斗仓（标准版）', retail: 999, wholesale: 599, note: '含安装螺丝', img: '' },
      { name: '格斗仓（加强版）', retail: 1299, wholesale: 799, note: '加厚壁厚', img: '' },
      { name: '格斗仓备件包', retail: 88, wholesale: 58, note: '螺栓+螺母', img: '' },
    ]
  },
  {
    id: 'ylj',
    name: '羽量级',
    products: [
      { name: 'BoxBot 羽量级主机', retail: 629, wholesale: 310, note: '含驱动板', img: '' },
      { name: '锂电池 7.4V 1000mAh', retail: 45, wholesale: 33, note: '2S 钴酸锂', img: '' },
      { name: '遥控器+接收机', retail: 138, wholesale: 99, note: '4通道', img: '' },
      { name: '充电器', retail: 88, wholesale: 65, note: '平衡充', img: '' },
      { name: '备用车轴', retail: 12, wholesale: 8, note: '2根/套', img: '' },
    ]
  }
];

// ===== 状态 =====
let sections = [];
let activeTab = 0;
let currentEditingRow = -1; // 当前上传图片的行索引

// ===== 工具函数 =====
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function saveData() {
  localStorage.setItem('robot_quotation_v2', JSON.stringify({
    sections: sections,
    customer: window._customer || { name: '', contact: '', phone: '' }
  }));
}

function loadData() {
  const raw = localStorage.getItem('robot_quotation_v2');
  if (raw) {
    try {
      const data = JSON.parse(raw);
      sections = data.sections;
      window._customer = data.customer || { name: '', contact: '', phone: '' };
      return;
    } catch(e) {}
  }
  sections = deepClone(DEFAULT_SECTIONS);
  window._customer = { name: '', contact: '', phone: '' };
}

function toast(msg, duration) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration || 1800);
}

function getBase64(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) { callback(e.target.result); };
  reader.readAsDataURL(file);
}

// ===== 渲染标签 =====
function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = sections.map((s, i) =>
    `<button class="tab-btn${i === activeTab ? ' active' : ''}" data-idx="${i}">${s.name}</button>`
  ).join('');

  el.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = parseInt(btn.dataset.idx);
      renderTabs();
      renderMain();
    });
  });
}

// ===== 渲染主内容 =====
function renderMain() {
  const sec = sections[activeTab];
  const container = document.getElementById('main');

  let html = '';

  // 客户信息
  html += `
  <div class="customer-info">
    <h3>👤 客户信息</h3>
    <div class="row">
      <label>客户名</label>
      <input type="text" placeholder="请输入客户名称" id="custName" value="${escHtml(window._customer.name)}">
    </div>
    <div class="row">
      <label>联系人</label>
      <input type="text" placeholder="请输入联系人" id="custContact" value="${escHtml(window._customer.contact)}">
    </div>
    <div class="row">
      <label>电话</label>
      <input type="tel" placeholder="请输入联系电话" id="custPhone" value="${escHtml(window._customer.phone)}">
    </div>
  </div>`;

  // 分组标题 + 添加行按钮
  html += `
  <div class="section-title">
    <h3>📦 ${sec.name}</h3>
    <button class="add-row-btn" id="addRowBtn">+ 添加行</button>
  </div>`;

  // 产品列表
  sec.products.forEach((p, idx) => {
    const imgHtml = p.img
      ? `<img src="${p.img}" alt="产品图">`
      : `<span class="placeholder">📷</span>`;
    const imgClass = p.img ? 'img-box has-img' : 'img-box';

    html += `
  <div class="product-row" data-sec="${activeTab}" data-row="${idx}">
    <button class="del-row-btn" data-del="${idx}">×</button>
    <div class="top">
      <div class="${imgClass}" data-img="${idx}">
        ${imgHtml}
        <button class="img-del" data-img-del="${idx}">×</button>
      </div>
      <div class="product-fields">
        <input type="text" class="product-name" data-field="name" data-row="${idx}"
          value="${escHtml(p.name)}" placeholder="产品名称">
        <textarea class="product-note" data-field="note" data-row="${idx}"
          placeholder="备注信息（如规格、特点）">${escHtml(p.note)}</textarea>
      </div>
    </div>
    <div class="price-row">
      <div class="price-item price-retail">
        <label>零售价(¥)</label>
        <input type="number" data-field="retail" data-row="${idx}"
          value="${p.retail}" placeholder="0">
      </div>
      <div class="price-item price-wholesale">
        <label>提货价(¥)</label>
        <input type="number" data-field="wholesale" data-row="${idx}"
          value="${p.wholesale}" placeholder="0">
      </div>
    </div>
  </div>`;
  });

  container.innerHTML = html;

  // 绑定事件
  bindMainEvents();
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function bindMainEvents() {
  // 客户信息变化
  ['custName', 'custContact', 'custPhone'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => {
      if (id === 'custName') window._customer.name = el.value;
      if (id === 'custContact') window._customer.contact = el.value;
      if (id === 'custPhone') window._customer.phone = el.value;
    });
  });

  // 添加行
  const addBtn = document.getElementById('addRowBtn');
  if (addBtn) {
    addBtn.addEventListener('click', () => {
      sections[activeTab].products.push({ name: '', retail: 0, wholesale: 0, note: '', img: '' });
      saveData();
      renderMain();
    });
  }

  // 产品行内事件代理
  const main = document.getElementById('main');
  main.addEventListener('click', e => {
    const target = e.target;

    // 删除行
    if (target.dataset.del !== undefined) {
      const idx = parseInt(target.dataset.del);
      if (sections[activeTab].products.length > 1) {
        sections[activeTab].products.splice(idx, 1);
        saveData();
        renderMain();
      } else {
        toast('至少保留一行！');
      }
      return;
    }

    // 上传图片
    if (target.dataset.img !== undefined || target.parentElement && target.parentElement.dataset.img !== undefined) {
      const idx = parseInt(target.dataset.img ?? target.parentElement.dataset.img);
      currentEditingRow = idx;
      document.getElementById('hiddenImgInput').click();
      return;
    }

    // 删除图片
    if (target.dataset.imgDel !== undefined) {
      const idx = parseInt(target.dataset.imgDel);
      sections[activeTab].products[idx].img = '';
      saveData();
      renderMain();
      return;
    }
  });

  // 输入变化
  main.addEventListener('input', e => {
    const row = parseInt(e.target.dataset.row);
    const field = e.target.dataset.field;
    if (isNaN(row) || !field) return;

    if (field === 'name') {
      sections[activeTab].products[row].name = e.target.value;
    } else if (field === 'note') {
      sections[activeTab].products[row].note = e.target.value;
    } else if (field === 'retail') {
      sections[activeTab].products[row].retail = parseFloat(e.target.value) || 0;
    } else if (field === 'wholesale') {
      sections[activeTab].products[row].wholesale = parseFloat(e.target.value) || 0;
    }
  });

  // 图片上传
  document.getElementById('hiddenImgInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file || currentEditingRow < 0) return;

    if (file.size > 2 * 1024 * 1024) {
      toast('图片不能超过2MB');
      return;
    }

    getBase64(file, base64 => {
      sections[activeTab].products[currentEditingRow].img = base64;
      saveData();
      renderMain();
    });
    e.target.value = '';
  });
}

// ===== 预览 =====
function generatePreviewHTML() {
  const c = window._customer;
  let html = `
  <div class="preview-title">
    <h1>🤖 2026 格斗机器人报价单</h1>
    <p>山东 BoxBot 机器人格斗赛 · 代理价格表</p>
  </div>`;

  if (c.name || c.contact || c.phone) {
    html += `
  <div class="preview-customer">
    ${c.name ? `<div><strong>客户：</strong>${escHtml(c.name)}</div>` : ''}
    ${c.contact ? `<div><strong>联系人：</strong>${escHtml(c.contact)}</div>` : ''}
    ${c.phone ? `<div><strong>电话：</strong>${escHtml(c.phone)}</div>` : ''}
  </div>`;
  }

  sections.forEach(sec => {
    html += `<div class="preview-section">
      <div class="preview-section-title">📦 ${sec.name}</div>
      <table class="preview-table">
        <thead>
          <tr>
            <th style="width:12%">序</th>
            <th style="width:18%">图片</th>
            <th>名称/备注</th>
            <th style="width:16%">零售价</th>
            <th style="width:16%">提货价</th>
          </tr>
        </thead>
        <tbody>`;

    sec.products.forEach((p, i) => {
      const imgTag = p.img ? `<img src="${p.img}" alt="产品图">` : '—';
      html += `
          <tr>
            <td>${i + 1}</td>
            <td>${imgTag}</td>
            <td class="td-name">${escHtml(p.name) || '—'}</td>
            <td class="td-retail">¥${p.retail}</td>
            <td class="td-wholesale">¥${p.wholesale}</td>
          </tr>`;
      if (p.note) {
        html += `
          <tr>
            <td></td>
            <td colspan="4" class="td-note" style="text-align:left;padding-left:6px;">${escHtml(p.note)}</td>
          </tr>`;
      }
    });

    html += `</tbody></table></div>`;
  });

  html += `
  <div class="preview-footer">
    <p>本报价单有效期至 2026年12月31日 · 最终解释权归主办方所有</p>
  </div>`;

  return html;
}

function showPreview() {
  const overlay = document.getElementById('previewOverlay');
  const page = document.getElementById('previewPage');
  page.innerHTML = generatePreviewHTML();
  overlay.classList.add('show');
  document.getElementById('previewContent').scrollTop = 0;
}

function hidePreview() {
  document.getElementById('previewOverlay').classList.remove('show');
}

// ===== 初始化 =====
function init() {
  loadData();
  renderTabs();
  renderMain();

  document.getElementById('btnSave').addEventListener('click', () => {
    saveData();
    toast('✅ 已保存');
  });

  document.getElementById('btnPreview').addEventListener('click', showPreview);
  document.getElementById('previewClose').addEventListener('click', hidePreview);

  // 点击遮罩关闭
  document.getElementById('previewOverlay').addEventListener('click', e => {
    if (e.target.id === 'previewOverlay') hidePreview();
  });

  // 截图提示
  document.getElementById('btnShare').addEventListener('click', () => {
    toast('📱 请截图保存预览页面');
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
